    <style>
        /* CSS Variables & Theme Definitions */
        :root {
            /* Light Theme */
            --bg-color: #f3f4f6;
            --surface-color: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --border-color: rgba(209, 213, 219, 0.5);

            --primary-hover: #1d4ed8;
            --accent: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --glass-blur: blur(12px);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --sidebar-width: 320px;
        }

        [data-theme="dark"] {

            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.9);
            --border-color: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --accent: #38bdf8;
            --success: #34d399;
            --danger: #f87171;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        }

        /* Reset & Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; /* App-like layout */
            display: flex;
            height: 100vh;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Typography */
        h1, h2, h3, h4, h5 { font-weight: 600; line-height: 1.2; margin-bottom: 1rem; color: var(--text-main); }
        h1 { font-size: 2.5rem; letter-spacing: -0.025em; }
        h2 { font-size: 1.875rem; margin-top: 2.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        h3 { font-size: 1.5rem; margin-top: 2rem; color: var(--accent); }
        p { margin-bottom: 1.25rem; font-size: 1.125rem; color: var(--text-muted); }
        ul, ol { margin-bottom: 1.25rem; padding-left: 1.5rem; font-size: 1.125rem; color: var(--text-muted); }
        li { margin-bottom: 0.5rem; }
        strong { color: var(--text-main); font-weight: 600; }
        em { color: var(--accent); font-style: normal; font-weight: 500; }

        /* Glassmorphism Utilities */
        .glass {

            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            border-radius: 1rem;

        /* Layout Structure */
        #sidebar {
            width: var(--sidebar-width);

        /* Navigation Footer */
        .lesson-footer {

            margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-color);

        .btn-nav {

        .btn-prev { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-prev:hover { background: var(--surface-hover); }
        .btn-next { background: var(--primary); border: 1px solid var(--primary); color: white; }
        .btn-next:hover { background: var(--primary-hover); }
        .btn-complete { background: var(--success); border: 1px solid var(--success); color: white; margin: 0 auto; display: block; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 2rem; cursor: pointer; transition: transform 0.2s; box-shadow: var(--shadow-md); }
        .btn-complete:hover { transform: scale(1.05); }
        .btn-complete:disabled { background: var(--border-color); border-color: var(--border-color); cursor: not-allowed; transform: none; }

        /* Table of Contents (Sticky Right) */
        .toc-container {
            position: fixed; right: 2rem; top: 5rem; width: 250px;
            padding: 1rem; max-height: calc(100vh - 8rem); overflow-y: auto;

        @media (max-width: 1400px) { .toc-container { display: none; } }
        .toc-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 700; margin-bottom: 1rem; }
        .toc-list { list-style: none; padding: 0; margin: 0; font-size: 0.9rem; }

        .toc-link:hover, .toc-link.active { color: var(--primary); font-weight: 500; }

        /* Keyboard Shortcuts Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);

        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--surface-color); border: 1px solid var(--border-color);
            padding: 2rem; border-radius: 1rem; box-shadow: var(--shadow-lg);

        .kbd {
            background: var(--bg-color); border: 1px solid var(--border-color);

        }
        .shortcut-row { display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;}

        /* Responsive Design */
        @media (max-width: 768px) {
            #sidebar { position: absolute; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            .lesson-viewer { padding: 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>

    <script>
        /**
         * CURRICULUM DATABASE
         * Philosophy: Nature First, Equations Later. 
         * Structure encompasses 12 modules. Detailed content provided for foundational lessons to demonstrate the architecture and pedagogy, while maintaining a complete, traversable structure for the entire physics curriculum.
         */
        const curriculum = [
            {
                id: "m1",
                title: "Module 1: Motion (Kinematics)",
                lessons: [
                    {
                        id: "m1-l1",
                        title: "The Nature of Motion",
                        objectives: ["Understand motion as a change relative to an observer.", "Distinguish between distance and displacement intuitively.", "Grasp the concept of rates of change (speed vs velocity)."],
                        prerequisites: ["Basic understanding of number lines."],
                        natureFirst: "Before Galileo and Newton, humans watched the stars move across the night sky, leaves fall from trees, and rivers flow. Motion is the most fundamental observation of the universe. If nothing moved, time itself would be meaningless. When we describe motion, we are essentially telling a story: Where did the object start? Where did it go? And how rushed was the journey?",
                        history: "Ancient Greeks believed objects moved because they possessed an 'inner desire' to reach their natural resting place. It wasn't until Galileo Galilei rolled balls down inclined planes that humanity realized motion follows precise, mathematical rules independent of the object's 'desires'.",
                        intuition: "Imagine you are blindfolded in a smoothly moving train. You can't feel the motion. You only feel motion when the train jerks (accelerates). This tells us something profound: steady velocity is physically indistinguishable from standing still. Motion is strictly relative.",
                        scientificStatement: "Kinematics is the geometry of motion without regard to the forces causing it. It defines position, displacement, velocity, and acceleration as vector quantities.",
                        formula: {
                            equation: "$$v_{avg} = \\frac{\\Delta x}{\\Delta t}$$",
                            breakdown: [
                                { var: "$v_{avg}$", desc: "Average velocity (vector)" },
                                { var: "$\\Delta x$", desc: "Displacement (change in position: $x_f - x_i$)" },
                                { var: "$\\Delta t$", desc: "Time interval ($t_f - t_i$)" }
                            ]
                        },
                        workedExample: "A cheetah spots a gazelle and sprints 100 meters due East in 4 seconds. Its displacement $\\Delta x$ is 100m East, and time $\\Delta t$ is 4s. Velocity $v = 100/4 = 25$ m/s East. Notice velocity includes direction, unlike a car's speedometer which only shows speed.",

        function renderSidebar(filterText = "") {

                    l.title.toLowerCase().includes(searchLower) || 
                    (l.natureFirst && l.natureFirst.toLowerCase().includes(searchLower))
                );

                if (filterText && matchingLessons.length === 0 && !module.title.toLowerCase().includes(searchLower)) return;

                const modGroup = document.createElement('div');
                modGroup.className = 'module-group';

                const isModuleActive = state.currentLessonId.startsWith(module.id) || filterText !== "";

                const header = document.createElement('div');
                header.className = `module-header ${isModuleActive ? 'active' : ''}`;
                header.innerHTML = `
                    <span>${module.title}</span>
                    <svg class="chevron" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>

                const list = document.createElement('ul');
                list.className = 'lesson-list';

                const lessonsToRender = filterText ? matchingLessons : module.lessons;

                lessonsToRender.forEach(lesson => {
                    const li = document.createElement('li');
                    const isCompleted = state.completedLessons.includes(lesson.id);
                    const isActive = state.currentLessonId === lesson.id;
                    li.className = `lesson-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}`;
                    li.innerHTML = `<span>${lesson.title}</span>`;
                    li.onclick = (e) => {
                        e.stopPropagation();
                        loadLesson(lesson.id);
                        if(window.innerWidth <= 768) toggleSidebar(); // Auto-close on mobile
                    };
                    list.appendChild(li);
                });

                header.onclick = () => {
                    header.classList.toggle('active');
                };

                modGroup.appendChild(header);
                modGroup.appendChild(list);
                DOM.tree.appendChild(modGroup);
            });
        }

                    html += `
                    <div class="quiz-question">
                        <p><strong>Question:</strong> ${q.question}</p>
                        <div class="quiz-options">${optsHtml}</div>
                        <div class="quiz-feedback" id="feedback-${qIndex}">${q.feedback}</div>
                    </div>`;
                });
                html += `</div>`;
            }

            if(lesson.summary) {
                html += `<h2 id="summary">Summary</h2><p>${lesson.summary}</p>`;
            }

            DOM.lessonContent.innerHTML = html;
        }

        function generateTOC() {
            DOM.tocList.innerHTML = '';
            const headers = DOM.lessonContent.querySelectorAll('h2');
            headers.forEach(h => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                const a = document.createElement('a');
                a.className = 'toc-link';
                a.href = `#${h.id}`;
                a.innerText = h.innerText;
                
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById(h.id).scrollIntoView({behavior: 'smooth', block: 'start'});
                };
                
                li.appendChild(a);
                DOM.tocList.appendChild(li);
            });
        }

        // Expose Quiz Handler to global scope for inline onclicks
        window.handleQuiz = function(button, correctIndex, selectedIndex, feedbackId) {
            const container = button.parentElement;
            const buttons = container.querySelectorAll('.quiz-option');
            const feedback = document.getElementById(feedbackId);
            
            // Reset
            buttons.forEach(b => { b.className = 'quiz-option'; b.disabled = true; });
            
            if(correctIndex === selectedIndex) {
                button.classList.add('correct');
                feedback.className = 'quiz-feedback show success';
            } else {
                button.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct'); // Show correct answer
                feedback.className = 'quiz-feedback show error';
            }
        };

        function getFlattenedLessons() {
            return curriculum.reduce((acc, mod) => acc.concat(mod.lessons), []);
        }

        function updateNavButtons() {
            const lessons = getFlattenedLessons();
            const currentIndex = lessons.findIndex(l => l.id === state.currentLessonId);

            if (currentIndex > 0) {
                DOM.btnPrev.style.visibility = 'visible';
                DOM.btnPrev.onclick = () => loadLesson(lessons[currentIndex - 1].id);
            } else {
                DOM.btnPrev.style.visibility = 'hidden';
            }

            if (currentIndex < lessons.length - 1) {
                DOM.btnNext.style.visibility = 'visible';
                DOM.btnNext.onclick = () => loadLesson(lessons[currentIndex + 1].id);
            } else {
                DOM.btnNext.style.visibility = 'hidden';
            }

            const isComplete = state.completedLessons.includes(state.currentLessonId);
            DOM.btnMarkComplete.innerText = isComplete ? '✓ Lesson Completed' : 'Mark Lesson Complete';
            DOM.btnMarkComplete.disabled = isComplete;
        }

        function updateProgress() {
            const lessons = getFlattenedLessons();
            const total = lessons.length;
            const completed = state.completedLessons.length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            DOM.progressBar.style.width = `${percentage}%`;
            DOM.progressText.innerText = `${percentage}%`;
            localStorage.setItem('physis_completed', JSON.stringify(state.completedLessons));
            renderSidebar(DOM.searchInput.value); // Re-render to show checkmarks
        }

        function markCurrentComplete() {
            if (!state.completedLessons.includes(state.currentLessonId)) {
                state.completedLessons.push(state.currentLessonId);
                updateProgress();
                updateNavButtons();
            }
        }

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            applyTheme(state.theme);
            localStorage.setItem('physis_theme', state.theme);
        }

        function applyTheme(theme) {
            DOM.html.setAttribute('data-theme', theme);
            const icon = DOM.themeToggle.querySelector('svg');
            if(theme === 'dark') {
                icon.innerHTML = '<path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3V8z"/>';
            } else {
                // Sun icon for light mode
                icon.innerHTML = '<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/>';
            }
        }

        function toggleSidebar() {
            if(window.innerWidth > 768) {
                // Desktop
                if(DOM.sidebar.style.transform === 'translateX(-100%)') {
                    DOM.sidebar.style.transform = 'none';
                    DOM.sidebar.style.position = 'relative';
                } else {
                    DOM.sidebar.style.transform = 'translateX(-100%)';
                    setTimeout(() => DOM.sidebar.style.position = 'absolute', 300);
                }
            } else {
                // Mobile
                DOM.sidebar.classList.toggle('open');
            }
        }

        function setupEventListeners() {
            DOM.themeToggle.addEventListener('click', toggleTheme);
            DOM.sidebarToggle.addEventListener('click', toggleSidebar);
            DOM.btnMarkComplete.addEventListener('click', markCurrentComplete);
            
            DOM.searchInput.addEventListener('input', (e) => {
                renderSidebar(e.target.value);
            });

            DOM.shortcutsBtn.addEventListener('click', () => {
                DOM.shortcutsModal.classList.add('active');
            });

            // Keyboard Shortcuts
            document.addEventListener('keydown', (e) => {
                if(e.ctrlKey && e.key === 'k') {
                    e.preventDefault();
                    DOM.searchInput.focus();
                }
                if(e.ctrlKey && e.key === 'b') {
                    e.preventDefault();
                    toggleSidebar();
                }
                if(e.ctrlKey && e.key === 't') {
                    e.preventDefault();
                    toggleTheme();
                }
                if(e.key === 'Escape') {
                    DOM.shortcutsModal.classList.remove('active');
                }
                // Arrow navigation (only if not typing in search)
                if(document.activeElement !== DOM.searchInput) {
                    if(e.key === 'ArrowRight' && DOM.btnNext.style.visibility === 'visible') {
                        DOM.btnNext.click();
                    }
                    if(e.key === 'ArrowLeft' && DOM.btnPrev.style.visibility === 'visible') {
                        DOM.btnPrev.click();
                    }
                }
            });

            // TOC Scroll spy (Highlight active section)
            DOM.lessonContent.parentElement.addEventListener('scroll', () => {
                const headers = DOM.lessonContent.querySelectorAll('h2');
                let current = '';
                
                headers.forEach(h => {
                    const hTop = h.getBoundingClientRect().top;
                    if (hTop < 150) { // Offset for header
                        current = h.id;
                    }
                });

                document.querySelectorAll('.toc-link').forEach(a => {
                    a.classList.remove('active');
                    if (a.getAttribute('href').substring(1) === current) {
                        a.classList.add('active');
                    }
                });
            });
        }

        // Boot the application
        init();

    </script>
</body>
</html>
